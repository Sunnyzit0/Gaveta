<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dark Vault - Sua Gaveta Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="tela-auth" class="container">
        <h1 id="titulo-auth">🔐 Dark Vault</h1>
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        
        <div class="botoes-auth">
            <button onclick="fazerLogin()">Entrar</button>
            <button onclick="irParaRegistro()" class="btn-secundario">Criar Conta</button>
        </div>
        <p id="mensagem" class="erro"></p>
    </div>

    <div id="tela-principal" class="container wide" style="display: none;">
        <header>
            <h2>Minha Gaveta</h2>
            <button onclick="logout()" class="btn-sair">Sair</button>
        </header>
        
        <div class="input-group">
            <textarea id="texto-nota" placeholder="Escreva uma nota..."></textarea>
            <input type="file" id="upload-arquivo">
            <button onclick="salvarItem()" class="btn-sucesso">Guardar na Gaveta</button>
        </div>

        <div id="lista-itens">
            <h3>Conteúdo Salvo:</h3>
            <div id="grid-itens"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
